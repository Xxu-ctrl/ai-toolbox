<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI工具箱 | 国内AI智能推荐</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Inter', 'SF Pro Display', -apple-system, sans-serif;
        background-color: #0f172a;
        color: #f1f5f9;
        background-image: radial-gradient(ellipse at 50% 0%, rgba(56, 189, 248, 0.08) 0%, transparent 60%);
      }
      #app {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px 24px;
      }
      @media (min-width: 1600px) {
        #app {
          max-width: 1500px;
        }
      }
      .app {
        min-height: 100vh;
        padding: 15px;
      }
      .app-header {
        margin-bottom: 15px;
      }
      .api-key-setup {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .api-key-input {
        flex: 1;
        padding: 0 10px;
        font-size: 12px;
        border: 2px solid #334155;
        border-radius: 4px;
        background-color: #0f172a;
        color: #f1f5f9;
        outline: none;
      }
      .api-key-input:focus {
        border-color: #38bdf8;
      }
      .api-key-button {
        padding: 0 15px;
        background-color: #38bdf8;
        color: #0f172a;
        border: none;
        border-radius: 4px;
        font-size: 12px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }
      .api-key-button:hover {
        background-color: #0ea5e9;
      }
      .api-key-status {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .status-text {
        color: #16a34a;
        font-weight: bold;
        font-size: 12px;
      }
      .clear-key-button {
        padding: 0 10px;
        background-color: #ef4444;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 11px;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }
      .clear-key-button:hover {
        background-color: #dc2626;
      }
      .loading-indicator {
        margin-top: 8px;
        text-align: center;
      }
      .loading-text {
        color: #38bdf8;
        font-size: 12px;
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.6;
        }
      }
      .header-row {
        background-color: rgba(30, 41, 59, 0.8);
        backdrop-filter: blur(10px);
        border-radius: 12px;
        border: 1px solid rgba(56, 189, 248, 0.15);
        padding: 12px 15px;
        margin-bottom: 15px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
        transition: all 0.2s ease;
      }
      .header-row:hover {
        border-color: rgba(56, 189, 248, 0.4);
        box-shadow: 0 8px 30px rgba(56, 189, 248, 0.15);
      }
      .brand-info {
        flex: 1;
        min-width: 250px;
      }
      .api-key-container {
        flex-shrink: 0;
      }
      .api-key-input {
        height: 32px;
        font-size: 12px;
        padding: 0 10px;
      }
      .api-key-button {
        height: 30px;
        font-size: 12px;
        padding: 0 15px;
      }
      .clear-key-button {
        height: 26px;
        font-size: 11px;
        padding: 0 10px;
      }
      .main-content {
        display: grid;
        grid-template-columns: 3fr 1.2fr;
        gap: 24px;
        align-items: flex-start;
      }
      .left-section {
        width: 100%;
      }
      .search-section {
        background-color: rgba(30, 41, 59, 0.8);
        backdrop-filter: blur(10px);
        border-radius: 12px;
        border: 1px solid rgba(56, 189, 248, 0.15);
        padding: 15px;
        margin-bottom: 20px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        transition: all 0.2s ease;
      }
      .search-section:hover {
        border-color: rgba(56, 189, 248, 0.4);
        box-shadow: 0 8px 30px rgba(56, 189, 248, 0.15);
      }
      .search-input-wrapper {
        position: relative;
        width: 100%;
        margin-bottom: 6px;
      }
      .search-input {
        width: 100%;
        padding: 12px 60px 12px 20px;
        font-size: 13px;
        border: 2px solid rgba(56, 189, 248, 0.2);
        border-radius: 24px;
        background-color: rgba(15, 23, 42, 0.95);
        color: #f1f5f9;
        outline: none;
        transition: all 0.2s ease;
        height: 42px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
      }
      .search-input:focus {
        border-color: rgba(56, 189, 248, 0.5);
        box-shadow: 0 2px 15px rgba(56, 189, 248, 0.2);
      }
      .search-button {
        position: absolute;
        right: 5px;
        top: 50%;
        transform: translateY(-50%);
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: linear-gradient(135deg, #38bdf8, #0ea5e9);
        color: #0f172a;
        border: none;
        font-size: 11px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .search-button:hover {
        background: linear-gradient(135deg, #7dd3fc, #38bdf8);
        transform: translateY(-50%) scale(1.05);
      }
      .loading-indicator {
        margin: 6px 0;
      }
      .quick-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin: 6px 0;
        justify-content: flex-start;
      }
      .quick-tag {
        padding: 4px 12px;
        background-color: rgba(51, 65, 85, 0.8);
        color: #f1f5f9;
        border-radius: 20px;
        font-size: 10px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .quick-tag:hover {
        background-color: rgba(56, 189, 248, 0.3);
        color: #f1f5f9;
        transform: translateY(-1px);
      }
      .category-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 6px;
        justify-content: flex-start;
      }
      .category-tag {
        padding: 4px 12px;
        background-color: rgba(51, 65, 85, 0.8);
        color: #f1f5f9;
        border-radius: 20px;
        font-size: 10px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .category-tag:hover {
        background-color: rgba(56, 189, 248, 0.3);
        transform: translateY(-1px);
      }
      .category-tag.active {
        background: linear-gradient(135deg, #38bdf8, #0ea5e9);
        color: #0f172a;
        font-weight: 600;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 2px;
        line-height: 1.2;
        background: linear-gradient(135deg, #38bdf8, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .subtitle {
        font-size: 0.8rem;
        font-weight: 400;
        color: #64748b;
        margin-bottom: 8px;
      }
      .right-section {
        width: 100%;
      }
      .chat-section {
        position: sticky;
        top: 10px;
      }
      .chat-window {
        background-color: rgba(30, 41, 59, 0.6);
        backdrop-filter: blur(12px);
        border-radius: 12px;
        border: 1px solid rgba(56, 189, 248, 0.15);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        height: 500px;
        min-height: 500px;
        display: flex;
        flex-direction: column;
        transition: all 0.2s ease;
      }
      .chat-window:hover {
        border-color: rgba(56, 189, 248, 0.4);
        box-shadow: 0 8px 30px rgba(56, 189, 248, 0.15);
      }
      .chat-messages {
        flex: 1;
        min-height: 200px;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .chat-placeholder {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #64748b;
        font-size: 14px;
        text-align: center;
        padding: 20px;
      }
      .chat-input-area {
        flex-shrink: 0;
      }
      @media (max-width: 768px) {
        .main-content {
          grid-template-columns: 1fr;
        }
        .chat-section {
          position: relative;
          top: 0;
          margin-top: 20px;
        }
        .chat-window {
          height: 350px;
          min-height: 350px;
        }
        .chat-messages {
          min-height: 150px;
        }
      }





      .recommendations {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
      }
      @media (max-width: 1024px) {
        .recommendations {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 640px) {
        .recommendations {
          grid-template-columns: repeat(1, 1fr);
        }
      }
      .card {
        background-color: rgba(30, 41, 59, 0.8);
        backdrop-filter: blur(10px);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        transition: all 0.25s ease;
        border: 1px solid rgba(56, 189, 248, 0.15);
        display: flex;
        flex-direction: column;
      }
      .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 30px rgba(56, 189, 248, 0.15);
        border-color: rgba(56, 189, 248, 0.4);
      }
      .card-image {
        width: 100%;
        height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card-image.gradient-1 {
        background: linear-gradient(135deg, #38bdf8, #818cf8);
      }
      .card-image.gradient-2 {
        background: linear-gradient(135deg, #10b981, #34d399);
      }
      .card-image.gradient-3 {
        background: linear-gradient(135deg, #8b5cf6, #a78bfa);
      }
      .card-image.gradient-4 {
        background: linear-gradient(135deg, #f59e0b, #fbbf24);
      }
      .card-image.gradient-5 {
        background: linear-gradient(135deg, #06b6d4, #22d3ee);
      }
      .image-text {
        color: white;
        font-weight: bold;
        font-size: 1.8rem;
      }
      .card-content {
        padding: 14px;
        display: flex;
        flex-direction: column;
        flex: 1;
      }
      .card-title {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #f1f5f9;
      }
      .card-description {
        font-size: 12px;
        color: #94a3b8;
        margin-bottom: 12px;
        line-height: 1.5;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .card-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-bottom: 12px;
      }
      .card-tag {
        padding: 2px 8px;
        background-color: rgba(51, 65, 85, 0.8);
        border-radius: 6px;
        color: #94a3b8;
        font-size: 10px;
        font-weight: 500;
      }
      .card-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      .card-price {
        padding: 2px 8px;
        border-radius: 8px;
        font-size: 10px;
        font-weight: 600;
      }
      .card-price.free {
        background-color: rgba(16, 185, 129, 0.3);
        color: #10b981;
      }
      .card-price.paid {
        background-color: rgba(245, 158, 11, 0.3);
        color: #f59e0b;
      }
      .card-button-container {
        margin-top: auto;
      }
      .card-button {
        width: 100%;
        padding: 0;
        height: 38px;
        background: linear-gradient(135deg, #38bdf8, #0ea5e9);
        color: #0f172a;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .card-button:hover {
        background: linear-gradient(135deg, #7dd3fc, #38bdf8);
        transform: translateY(-1px);
      }
      .tools-section {
        min-height: 80vh;
      }
      .chat-header {
        padding: 15px;
        background-color: rgba(15, 23, 42, 0.8);
        border-bottom: 1px solid rgba(56, 189, 248, 0.2);
        position: relative;
      }
      .chat-header::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.5), transparent);
      }
      .chat-header h2 {
        font-size: 15px;
        font-weight: 600;
        color: #f1f5f9;
        margin: 0;
      }
      .chat-messages {
        flex: 1;
        padding: 15px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .chat-message {
        display: flex;
        margin-bottom: 10px;
      }
      .user-message {
        justify-content: flex-end;
      }
      .ai-message {
        justify-content: flex-start;
      }
      .message-bubble {
        max-width: 80%;
        padding: 10px 15px;
        border-radius: 18px;
        transition: all 0.2s ease;
      }
      .user-message .message-bubble {
        background: linear-gradient(135deg, #38bdf8, #0ea5e9);
        color: #0f172a;
        border-bottom-right-radius: 4px;
      }
      .ai-message .message-bubble {
        background-color: rgba(51, 65, 85, 0.8);
        color: #f1f5f9;
        border-bottom-left-radius: 4px;
      }
      .chat-input-area {
        display: flex;
        padding: 15px;
        border-top: 1px solid rgba(56, 189, 248, 0.2);
        background-color: rgba(15, 23, 42, 0.8);
      }
      .chat-input {
        flex: 1;
        padding: 10px 15px;
        border: 2px solid rgba(56, 189, 248, 0.2);
        border-radius: 12px;
        background-color: rgba(15, 23, 42, 0.8);
        color: #f1f5f9;
        outline: none;
        margin-right: 10px;
        transition: all 0.2s ease;
      }
      .chat-input:focus {
        border-color: rgba(56, 189, 248, 0.5);
        box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
      }
      .chat-send-button {
        padding: 10px 20px;
        background: linear-gradient(135deg, #38bdf8, #0ea5e9);
        color: #0f172a;
        border: none;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .chat-send-button:hover {
        background: linear-gradient(135deg, #7dd3fc, #38bdf8);
        transform: scale(1.02);
      }
      .chat-send-button:disabled {
        background-color: #64748b;
        cursor: not-allowed;
        transform: none;
      }
      .view-recommendations-button {
        margin-top: 10px;
        padding: 6px 12px;
        background: linear-gradient(135deg, #38bdf8, #0ea5e9);
        color: #0f172a;
        border: none;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .view-recommendations-button:hover {
        background: linear-gradient(135deg, #7dd3fc, #38bdf8);
        transform: scale(1.02);
      }
      .recommendation-reason {
        font-size: 14px;
        font-weight: 600;
        color: #f1f5f9;
        margin-bottom: 10px;
        padding-left: 10px;
        border-left: 3px solid #38bdf8;
      }
      .recommendation-list {
        margin-bottom: 10px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .recommendation-item {
        background-color: rgba(56, 189, 248, 0.08);
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 12px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .tool-name {
        font-weight: 600;
        color: #38bdf8;
      }
      .tool-desc {
        color: #94a3b8;
      }
      .typing-indicator {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 12px;
        font-style: italic;
        color: #94a3b8;
        padding: 12px 16px;
        background-color: rgba(51, 65, 85, 0.6);
        border-radius: 18px;
      }
      .ellipsis {
        position: relative;
        width: 16px;
        height: 12px;
      }
      .ellipsis::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 16px;
        height: 12px;
        animation: ellipsis 1.5s infinite;
      }
      @keyframes ellipsis {
        0%, 20% {
          content: '.';
        }
        40% {
          content: '..';
        }
        60%, 100% {
          content: '...';
        }
      }
      .streaming-message {
        position: relative;
        display: flex;
        align-items: flex-end;
        gap: 4px;
      }
      .streaming-indicator {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background-color: #38bdf8;
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0% {
          transform: scale(0.8);
          opacity: 0.8;
        }
        50% {
          transform: scale(1);
          opacity: 1;
        }
        100% {
          transform: scale(0.8);
          opacity: 0.8;
        }
      }
      @media (max-width: 768px) {
        .main-content {
          grid-template-columns: 1fr;
        }
        .chat-section {
          position: relative;
          height: 60vh;
        }
        .recommendations {
          grid-template-columns: 1fr;
        }
        h1 {
          font-size: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="app">
        <div class="app-header">
          <!-- 品牌标题 + API Key 设置 -->
          <div class="header-row">
            <div class="brand-info">
              <h1>AI工具箱 | 国内AI智能推荐</h1>
              <p class="subtitle">说你想做什么，我帮你选最合适的AI</p>
            </div>
            <div class="api-key-container">
              <div v-if="!hasApiKey" class="api-key-setup">
                <input 
                  v-model="userApiKey"
                  type="password" 
                  placeholder="输入阿里云百炼 API Key..."
                  class="api-key-input"
                >
                <button @click="saveApiKey" class="api-key-button">保存</button>
              </div>
              <div v-else class="api-key-status">
                <span class="status-text">已配置 ✓</span>
                <button @click="clearApiKey" class="clear-key-button">清除</button>
              </div>
            </div>
          </div>
        </div>
        
        <!-- 主内容区：左右两栏 -->
        <div class="main-content">
          <!-- 左侧：搜索 + 分类 + 工具卡片 -->
          <div class="left-section">
            <!-- 搜索区 -->
            <div class="search-section">
              <div class="search-input-wrapper">
                <input 
                  v-model="searchQuery" 
                  @keyup.enter="performSearch"
                  type="text" 
                  placeholder="告诉我你想做什么，比如'写周报'、'做海报'..."
                  class="search-input"
                  :disabled="isLoading"
                >
                <button @click="performSearch" class="search-button" :disabled="isLoading">
                  {{ isLoading ? '搜索中...' : '搜索' }}
                </button>
              </div>
              <div v-if="isLoading" class="loading-indicator">
                <span class="loading-text">AI 思考中...</span>
              </div>
              <div class="quick-tags">
                <span class="quick-tag" @click="selectQuickTag('写文案')">写文案</span>
                <span class="quick-tag" @click="selectQuickTag('做PPT')">做PPT</span>
                <span class="quick-tag" @click="selectQuickTag('抠图')">抠图</span>
                <span class="quick-tag" @click="selectQuickTag('写代码')">写代码</span>
                <span class="quick-tag" @click="selectQuickTag('做视频')">做视频</span>
              </div>
              <div class="category-tags">
                <span 
                  v-for="tag in categoryTags" 
                  :key="tag"
                  @click="selectCategory(tag)"
                  :class="['category-tag', { 'active': selectedCategory === tag }]"
                >
                  {{ tag }}
                </span>
              </div>
            </div>
            
            <!-- 工具卡片 -->
            <div class="tools-section">
              <div class="recommendations">
                <div 
                  v-for="(item, index) in (matchedTools || filteredRecommendations)" 
                  :key="index"
                  class="card"
                >
                  <div :class="['card-image', 'gradient-' + ((index % 5) + 1)]">
                  <span class="image-text">{{ item.name.charAt(0) }}</span>
                </div>
                  <div class="card-content">
                    <h3 class="card-title">{{ item.name }}</h3>
                    <p class="card-description">{{ item.description }}</p>
                    <div class="card-tags">
                      <span v-for="(tag, tagIndex) in item.tags" :key="tagIndex" class="card-tag">{{ tag }}</span>
                    </div>
                    <div class="card-meta">
                      <span :class="['card-price', item.isFree ? 'free' : 'paid']">{{ item.isFree ? '免费' : '付费' }}</span>
                    </div>
                    <div class="card-button-container">
                      <a :href="item.url" target="_blank" rel="noopener noreferrer">
                        <button class="card-button">立即使用</button>
                      </a>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          
          <!-- 右侧：AI对话窗口 -->
          <div class="right-section">

              result = result.filter(item => 
                item.tags.includes(this.selectedCategory)
              )
            }
            
            // 关键词搜索
            if (this.searchQuery) {
              const query = this.searchQuery.toLowerCase()
              result = result.filter(item => 
                item.name.toLowerCase().includes(query) ||
                item.description.toLowerCase().includes(query) ||
                item.tags.some(tag => tag.toLowerCase().includes(query)) ||
                item.keywords.some(keyword => keyword.toLowerCase().includes(query))
              )
            }
            
            return result
          },

            return !!localStorage.getItem('zhipu_api_key')
          }

        methods: {
          handleInput() {
            // 可以在这里添加防抖处理或其他逻辑
          },
          selectQuickTag(tag) {
            this.searchQuery = tag
            this.performSearch()
          },
          selectCategory(category) {
            this.selectedCategory = category
            if (category === '全部') {
              this.matchedTools = null
            } else {
              this.matchedTools = this.tools.filter(item => 
                item.tags.includes(category)
              )
            }
          },
          saveApiKey() {
            localStorage.setItem('zhipu_api_key', this.userApiKey)
          },
          clearApiKey() {
            localStorage.removeItem('zhipu_api_key')
            this.userApiKey = ''
          },
          async performSearch() {
            this.isLoading = true
            try {
              if (this.userApiKey) {
                const recommendations = await this.fetchAIRecommendation(this.searchQuery)
                if (recommendations && recommendations.length > 0) {
                  // 匹配完整工具信息
                  this.matchedTools = recommendations.map(rec => {
                    return this.tools.find(tool => tool.name === rec.name)
                  }).filter(Boolean)
                } else {
                  // 回退到本地筛选
                  this.matchedTools = null
                }
              } else {
                // 使用本地筛选
                this.matchedTools = null
              }
            } catch (error) {
              console.error('搜索失败，回退到本地筛选:', error)
              this.matchedTools = null
            } finally {
              this.isLoading = false
            }
          },
          async fetchAIRecommendation(query, retryCount = 0) {
            try {
              if (!this.userApiKey) {
                return null
              }
              
              const toolsSummary = this.tools.map(tool => `- ${tool.name}: ${tool.description}`).join('\n')
              const systemMessage = `你是一个AI工具推荐助手。根据用户的需求，从下列工具库中推荐最合适的1-3个工具。请用简洁的语言回复，推荐理由要简短。工具库：${toolsSummary}`
              
              const response = await fetch('https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${this.userApiKey}`
                },
                body: JSON.stringify({
                  model: 'qwen-turbo',
                  messages: [
                    {
                      role: 'system',
                      content: '你是一个友好的AI助手，帮助用户解决各种问题。'
                    },
                    {
                      role: 'system',
                      content: systemMessage
                    },
                    {
                      role: 'user',
                      content: query
                    }
                  ],
                  temperature: 0.1,
                  max_tokens: 500,
                  stream: true
                })
              })
              
              if (response.ok) {
                const reader = response.body.getReader()
                const decoder = new TextDecoder()
                let fullContent = ''
                
                while (true) {
                  const { done, value } = await reader.read()
                  if (done) break
                  
                  const chunk = decoder.decode(value, { stream: true })
                  const lines = chunk.split('\n')
                  
                  for (const line of lines) {
                    if (line.startsWith('data: ')) {
                      const data = line.substring(6)
                      if (data === '[DONE]') break
                      
                      try {
                        const json = JSON.parse(data)
                        if (json.choices && json.choices[0] && json.choices[0].delta && json.choices[0].delta.content) {
                          const contentChunk = json.choices[0].delta.content
                          fullContent += contentChunk
                        }
                      } catch (e) {
                        console.error('Error parsing chunk:', e)
                      }
                    }
                  }
                }
                
                // 提取JSON部分
                const jsonMatch = fullContent.match(/\[\{[\s\S]*\}\]/)
                if (jsonMatch) {
                  return JSON.parse(jsonMatch[0])
                } else {
                  throw new Error('Invalid response format')
                }
              } else if (response.status === 429 && retryCount < 1) {
                // 429 频率限制，自动重试
                await new Promise(resolve => setTimeout(resolve, 2000))
                return this.fetchAIRecommendation(query, retryCount + 1)
              } else {
                throw new Error('API request failed')
              }
            } catch (error) {
              console.error('Error fetching AI recommendation:', error)
              return null
            }
          },

              // 调用阿里云DashScope API
              const response = await fetch('https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${this.userApiKey}`
                },
                body: JSON.stringify({
                  model: 'qwen-turbo',
                  messages: [
                    {
                      role: 'system',
                      content: '你是一个友好的AI助手，帮助用户解决各种问题。'
                    },
                    {
                      role: 'system',
                      content: `你是一个AI工具推荐助手。你必须严格从下列工具库中推荐工具，绝不能推荐工具库之外的任何工具。

当用户需要推荐工具时，你必须按以下步骤操作：
1. 先写一句推荐理由（不超过30字）
2. 然后列出工具库中所有符合要求的工具，格式为"工具名 - 一句话特点"，每行一个
3. 最后单独一行写【工具列表】：工具名1,工具名2,工具名3

重要规则：
- 只要工具库里有符合需求的工具，就全部列出来，不要只推荐一个
- 工具名必须和工具库里的名称完全一致
- 每个工具的特点说明不超过15个字
- 不要写【可选工具】标签，直接用"工具名 - 特点"格式

工具库：${toolsSummary}`
                    },
                    ...this.chatMessages.filter(msg => !msg.isStreaming).map(msg => ({
                      role: msg.role === 'user' ? 'user' : 'assistant',
                      content: msg.role === 'assistant' ? msg.content.replace(/【工具列表】：[\s\S]*/g, '').trim() : msg.content
                    }))
                  ],
                  temperature: 0.1,
                  max_tokens: 500,
                  stream: true
                })
              })
              
              if (response.ok) {
                const reader = response.body.getReader()
                const decoder = new TextDecoder()
                let fullContent = ''
                
                while (true) {
                  const { done, value } = await reader.read()
                  if (done) break
                  
                  const chunk = decoder.decode(value, { stream: true })
                  const lines = chunk.split('\n')
                  
                  for (const line of lines) {
                    if (line.startsWith('data: ')) {
                      const data = line.substring(6)
                      if (data === '[DONE]') break
                      
                      try {
                        const json = JSON.parse(data)
                        if (json.choices && json.choices[0] && json.choices[0].delta && json.choices[0].delta.content) {
                          const contentChunk = json.choices[0].delta.content
                          fullContent += contentChunk
                          
                          // 更新消息内容
                          this.chatMessages[placeholderIndex] = {
                            ...this.chatMessages[placeholderIndex],
                            content: fullContent
                          }
                          
                          // 滚动到底部
                          this.scrollToBottom()
                        }
                      } catch (e) {
                        console.error('Error parsing chunk:', e)
                      }
                    }
                  }
                }
                
                // 提取推荐的工具名
                // 优先从【工具列表】中提取工具名数组
                let recommendedTools = []
                const toolNames = this.getToolList(fullContent)
                if (toolNames && toolNames.length > 0) {
                  // 用工具名去 this.tools 中匹配完整对象
                  recommendedTools = toolNames.map(name => this.tools.find(tool => tool.name === name)).filter(Boolean)
                }
                
                // 如果没提取到，回退到字符串匹配方式
                if (recommendedTools.length === 0) {
                  recommendedTools = this.extractRecommendedTools(fullContent)
                }
                
                // 完成流式输出，更新消息
                this.chatMessages[placeholderIndex] = {
                  role: 'assistant',
                  content: fullContent,
                  hasRecommendations: recommendedTools.length > 0,
                  recommendedTools: recommendedTools
                }
                
                // 如果有推荐，同步到左侧
                if (recommendedTools.length > 0) {
                  this.matchedTools = recommendedTools
                }
              } else if (response.status === 429 && retryCount < 1) {
                // 429 频率限制，自动重试
                this.chatMessages[placeholderIndex] = {
                  ...this.chatMessages[placeholderIndex],
                  content: '请求太频繁，正在尝试重新连接...'
                }
                this.scrollToBottom()
                
                await new Promise(resolve => setTimeout(resolve, 3000))
                this.isChatLoading = false
                
                // 递归重试
                return this.sendMessage(retryCount + 1)
              } else {
                throw new Error('API request failed')
              }
            } catch (error) {
              console.error('Error sending message:', error)
              // 替换占位消息为错误消息
              this.chatMessages[placeholderIndex] = {
                role: 'assistant',
                content: '抱歉，我暂时无法响应。'
              }
            } finally {
              this.isChatLoading = false
              // 滚动到底部
              this.scrollToBottom()
            }
          },
          scrollToBottom() {
            setTimeout(() => {
              const chatMessagesEl = this.$refs.chatMessages
              if (chatMessagesEl) {
                chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight
              }
            }, 100)
          },
          extractRecommendedTools(content) {
            // 提取AI回复中提到的工具名
            const recommendedTools = []
            
            // 将content按标点符号和空格分割成词语
            const words = content.split(/[，、。！？；：""''（）【】《》\s\n\r]+/).filter(word => word.length > 1)
            
            this.tools.forEach(tool => {
              // 检查词语中是否包含完整的工具名
              const toolName = tool.name
              const found = words.some(word => word === toolName || word.includes(toolName) || toolName.includes(word))
              if (found) {
                // 避免重复添加
                if (!recommendedTools.find(t => t.name === tool.name)) {
                  recommendedTools.push(tool)
                }
              }
            })
            
            return recommendedTools
          },
          viewRecommendations() {
            // 聚焦到左侧卡片区域
            document.querySelector('.tools-section').scrollIntoView({ behavior: 'smooth' })
          },
          getToolList(content) {
            try {
              // 优先从【工具列表】：提取（每行一个工具名的格式）
              const match = content.match(/【工具列表】：([\s\S]*?)(?=【|$)/s)
              if (match && match[1]) {
                const lines = match[1].trim().split('\n')
                const tools = lines.map(line => {
                  // 去除行首的行号、数字、点号等
                  return line.replace(/^[0-9百千万低中高]+[.、、:：)\]]*\s*/, '').trim()
                }).filter(name => name && name.length > 1)
                if (tools.length > 0) {
                  return tools
                }
              }
              
              // 回退到从【可选工具】：提取（每行"- "前面的文字）
              const optionalMatch = content.match(/【可选工具】：([\s\S]*?)(?=【工具列表】：|$)/s)
              if (optionalMatch && optionalMatch[1]) {
                const lines = optionalMatch[1].trim().split('\n')
                return lines.map(line => {
                  const dashIndex = line.indexOf('-')
                  if (dashIndex > 0) {
                    return line.substring(0, dashIndex).trim()
                  }
                  return line.replace(/^[0-9百千万低中高]+[.、、:：)\]]*\s*/, '').trim()
                }).filter(name => name && name.length > 1)
              }
              
              return []
            } catch (e) {
              console.error('Error getting tool list:', e)
              return []
            }
          },
          getRecommendationReason(content) {
            try {
              const match = content.match(/【推荐理由】：(.*?)(?=【|$)/s)
              if (match && match[1]) {
                return match[1].trim()
              }
              return ''
            } catch (e) {
              console.error('Error getting recommendation reason:', e)
              return ''
            }
          }
        }
      }).mount('#app')
    </script>
  </body>
</html>
